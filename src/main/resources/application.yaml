spring:
  application:
    name: weatherdashboardback

app:
  cors:
    allowed-origins: https://weather-dashboard-front-ten.vercel.app,http://localhost:4200

openweather:
  api:
    key: ${OPENWEATHER_API_KEY:}
    base-url: https://api.openweathermap.org/data/2.5

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui

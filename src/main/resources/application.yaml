spring:
  application:
    name: weatherdashboardback

app:
  cors:
    allowed-origins: http://localhost:4200,https://weather-dashboard-front-ten.vercel.app

openweather:
  api:
    key: ${OPENWEATHER_API_KEY:}
    base-url: https://api.openweathermap.org/data/2.5

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui
